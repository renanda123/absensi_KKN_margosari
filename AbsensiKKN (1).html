<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Absensi KKN Desa Margosari 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Special+Elite&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root {
    --cover: #3B1A63;
    --cover-dark: #220C3D;
    --gold: #C7A252;
    --paper: #F1EAF5;
    --paper-line: #D6C6E2;
    --ink: #2A2338;
    --ink-soft: #6A5C7C;
    --stempel: #7A2FB0;
    --stempel-dark: #571F82;
  }

  * { box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    color: var(--ink);
    min-height: 100vh;
    margin: 0;
    background: radial-gradient(1200px 600px at 50% -10%, var(--cover) 0%, var(--cover-dark) 60%, #170830 100%);
    padding: 40px 16px 64px;
  }

  .kkn-cover-title {
    text-align: center;
    margin: 0 0 24px;
  }
  .kkn-logo {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4), 0 0 0 3px var(--gold);
    margin-bottom: 14px;
  }
  .kkn-cover-title .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.25em;
    font-size: 11px;
    color: var(--gold);
    text-transform: uppercase;
    opacity: 0.9;
  }
  .kkn-cover-title h1 {
    font-family: 'Special Elite', cursive;
    font-size: clamp(26px, 5vw, 40px);
    color: #F3ECFA;
    margin: 6px 0 4px;
    letter-spacing: 0.02em;
  }
  .kkn-cover-title p {
    color: #D3C3E4;
    font-size: 13px;
    margin: 0;
  }

  .kkn-tabs {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 22px;
  }
  .kkn-tab-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background: transparent;
    border: 1px solid rgba(199,162,82,0.4);
    color: #E4D9EE;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s ease;
  }
  .kkn-tab-btn:hover { border-color: var(--gold); color: #F3ECFA; }
  .kkn-tab-btn.active { background: var(--gold); color: var(--cover-dark); border-color: var(--gold); font-weight: 600; }

  .kkn-card {
    max-width: 640px;
    margin: 0 auto;
    background: var(--paper);
    border-radius: 6px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35), 0 2px 0 rgba(255,255,255,0.4) inset;
    position: relative;
    background-image: linear-gradient(var(--paper-line) 1px, transparent 1px);
    background-size: 100% 34px;
    background-position: 0 92px;
    padding: 30px 30px 34px;
    overflow: hidden;
  }
  .kkn-card::before {
    content: "";
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 8px;
    background: repeating-linear-gradient(90deg, var(--stempel) 0 14px, transparent 14px 24px);
    opacity: 0.85;
  }

  .kkn-form-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 10px;
    margin-bottom: 18px;
  }
  .kkn-form-header h2 {
    font-family: 'Special Elite', cursive;
    font-size: 20px;
    margin: 0;
  }
  .kkn-form-header span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-soft);
  }

  .kkn-field { margin-bottom: 16px; }
  .kkn-field label {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .kkn-field input, .kkn-field textarea, .kkn-field select {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1.5px solid #B3A2C2;
    padding: 6px 2px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s ease;
  }
  .kkn-field input:focus, .kkn-field textarea:focus, .kkn-field select:focus {
    border-bottom-color: var(--stempel);
  }
  .kkn-field textarea { resize: vertical; min-height: 44px; font-family: 'Inter', sans-serif; }

  .kkn-status-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .kkn-status-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 14px;
    border-radius: 4px;
    border: 1.5px solid #B3A2C2;
    background: transparent;
    cursor: pointer;
    color: var(--ink-soft);
  }
  .kkn-status-chip.active {
    border-color: var(--stempel);
    color: #fff;
    background: var(--stempel);
    font-weight: 600;
  }

  .kkn-submit-row { display: flex; align-items: center; gap: 16px; margin-top: 22px; }
  .kkn-submit-btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    background: var(--ink);
    color: #F3ECFA;
    border: none;
    padding: 12px 22px;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.1s ease, background 0.15s ease;
  }
  .kkn-submit-btn:hover { background: var(--stempel-dark); }
  .kkn-submit-btn:active { transform: scale(0.97); }
  .kkn-submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .kkn-error {
    font-size: 13px;
    color: var(--stempel-dark);
    font-family: 'JetBrains Mono', monospace;
  }

  .kkn-stamp-wrap { position: relative; width: 74px; height: 74px; flex-shrink: 0; }
  .kkn-stamp {
    width: 74px; height: 74px;
    border-radius: 50%;
    border: 3px solid var(--stempel);
    display: flex; align-items: center; justify-content: center;
    transform: scale(0) rotate(-18deg);
    opacity: 0;
  }
  .kkn-stamp.show { animation: stampIn 0.5s cubic-bezier(.2,1.4,.4,1) forwards; }
  .kkn-stamp::after {
    content: "";
    position: absolute; inset: 6px;
    border-radius: 50%;
    border: 1px solid var(--stempel);
    opacity: 0.6;
  }
  .kkn-stamp span {
    font-family: 'Special Elite', cursive;
    color: var(--stempel);
    font-size: 10px;
    letter-spacing: 0.05em;
    text-align: center;
    line-height: 1.2;
    white-space: pre;
  }
  @keyframes stampIn {
    0% { transform: scale(2) rotate(-18deg); opacity: 0; }
    55% { transform: scale(0.9) rotate(-14deg); opacity: 1; }
    75% { transform: scale(1.08) rotate(-16deg); }
    100% { transform: scale(1) rotate(-15deg); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .kkn-stamp.show { animation: none; transform: scale(1) rotate(-15deg); opacity: 1; }
  }

  /* ---- Login ---- */
  .kkn-login-card {
    max-width: 380px;
    margin: 60px auto 0;
    background: var(--paper);
    border-radius: 6px;
    padding: 32px 28px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    text-align: center;
  }
  .kkn-login-card h2 { font-family: 'Special Elite', cursive; font-size: 19px; margin: 12px 0 4px; }
  .kkn-login-card p { font-size: 13px; color: var(--ink-soft); margin: 0 0 18px; }
  .kkn-login-card input {
    width: 100%;
    border: 1.5px solid #B3A2C2;
    border-radius: 4px;
    padding: 10px 12px;
    font-size: 15px;
    margin-bottom: 12px;
    background: #fff;
    outline: none;
  }
  .kkn-login-card input:focus { border-color: var(--stempel); }
  .kkn-lock-icon {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--cover);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto;
  }

  /* ---- Admin ---- */
  .kkn-admin-wrap { max-width: 1000px; margin: 0 auto; }
  .kkn-admin-card {
    background: var(--paper);
    border-radius: 6px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    padding: 24px 24px 30px;
  }
  .kkn-admin-top {
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid var(--ink);
    padding-bottom: 12px; margin-bottom: 18px;
    flex-wrap: wrap; gap: 10px;
  }
  .kkn-admin-top h2 {
    font-family: 'Special Elite', cursive;
    font-size: 20px; margin: 0;
    display: flex; align-items: center; gap: 8px;
  }
  .kkn-icon-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; letter-spacing: 0.04em;
    background: transparent; border: 1.5px solid var(--ink);
    padding: 7px 12px; border-radius: 4px; cursor: pointer;
    color: var(--ink);
  }
  .kkn-icon-btn:hover { background: var(--ink); color: var(--paper); }
  .kkn-icon-btn.primary { background: var(--stempel); border-color: var(--stempel); color: #fff; }
  .kkn-icon-btn.primary:hover { background: var(--stempel-dark); }

  .kkn-summary-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; }
  .kkn-summary-chip {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border: 1.5px solid var(--paper-line);
    border-radius: 4px;
    padding: 8px 12px;
    background: #fff;
  }
  .kkn-summary-chip b { display: block; font-size: 16px; }

  .kkn-filters { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .kkn-filters .search-box {
    display: flex; align-items: center; gap: 6px;
    border: 1.5px solid var(--paper-line);
    border-radius: 4px; padding: 6px 10px; background: #fff;
    flex: 1; min-width: 200px;
  }
  .kkn-filters input { border: none; outline: none; font-size: 14px; width: 100%; background: transparent; }
  .kkn-filters select {
    border: 1.5px solid var(--paper-line); border-radius: 4px; padding: 6px 10px;
    font-size: 13px; background: #fff; font-family: 'JetBrains Mono', monospace;
  }

  .kkn-table-wrap { overflow-x: auto; border: 1px solid var(--paper-line); border-radius: 4px; }
  table.kkn-table { width: 100%; border-collapse: collapse; font-size: 13px; background: #fff; }
  table.kkn-table th {
    font-family: 'JetBrains Mono', monospace;
    text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em;
    background: var(--cover); color: #F3ECFA;
    padding: 10px 12px;
  }
  table.kkn-table td { padding: 9px 12px; border-top: 1px solid var(--paper-line); vertical-align: top; }
  table.kkn-table tr:nth-child(even) td { background: #FAF7FC; }
  .kkn-status-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 3px; color: #fff;
    display: inline-block;
  }
  .kkn-del-btn { background: transparent; border: none; cursor: pointer; color: var(--stempel-dark); opacity: 0.7; }
  .kkn-del-btn:hover { opacity: 1; }
  .kkn-empty { text-align: center; padding: 30px; color: var(--ink-soft); font-size: 13px; }
  .hidden { display: none !important; }
  svg.icon { vertical-align: -3px; }
</style>
</head>

function todayISO() {
  const d = new Date();
  const off = d.getTimezoneOffset();
  const local = new Date(d.getTime() - off * 60000);
  return local.toISOString().slice(0, 10);
}

function formatTanggal(iso) {
  if (!iso) return "-";
  const [y, m, d] = iso.split("-").map(Number);
  const dt = new Date(y, m - 1, d);
  return dt.toLocaleDateString("id-ID", { weekday: "long", year: "numeric", month: "long", day: "numeric" });
}

function loadRecords() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    records = raw ? JSON.parse(raw) : [];
    if (!Array.isArray(records)) records = [];
  } catch (e) {
    records = [];
  }
}

function persist() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    document.getElementById("loadError").textContent = "";
  } catch (e) {
    document.getElementById("loadError").textContent = "Gagal menyimpan data di penyimpanan browser ini.";
  }
}

// ---------- View switching ----------
const tabFormBtn = document.getElementById("tabFormBtn");
const tabAdminBtn = document.getElementById("tabAdminBtn");
const viewForm = document.getElementById("viewForm");
const viewLogin = document.getElementById("viewLogin");
const viewAdmin = document.getElementById("viewAdmin");

function showView(v) {
  viewForm.classList.toggle("hidden", v !== "form");
  viewLogin.classList.toggle("hidden", v !== "login");
  viewAdmin.classList.toggle("hidden", v !== "admin");
  tabFormBtn.classList.toggle("active", v === "form");
  tabAdminBtn.classList.toggle("active", v !== "form");
}

tabFormBtn.addEventListener("click", () => showView("form"));
tabAdminBtn.addEventListener("click", () => {
  const current = viewAdmin.classList.contains("hidden") && viewLogin.classList.contains("hidden") ? "form" : (viewAdmin.classList.contains("hidden") ? "login" : "admin");
  showView(current === "form" ? "login" : current);
});

// ---------- Status chips ----------
const statusRow = document.getElementById("statusRow");
STATUS_OPTIONS.forEach((s) => {
  const btn = document.createElement("button");
  btn.type = "button";
  btn.className = "kkn-status-chip" + (s === currentStatus ? " active" : "");
  btn.textContent = s;
  btn.addEventListener("click", () => {
    currentStatus = s;
    [...statusRow.children].forEach((c) => c.classList.toggle("active", c.textContent === s));
  });
  statusRow.appendChild(btn);
});

// ---------- Form submit ----------
document.getElementById("fTanggal").value = todayISO();

document.getElementById("absenForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const errEl = document.getElementById("formError");
  errEl.textContent = "";
  const nama = document.getElementById("fNama").value.trim();
  const tanggal = document.getElementById("fTanggal").value;
  const divisi = document.getElementById("fDivisi").value;
  const kontribusi = document.getElementById("fKontribusi").value.trim();
  const catatan = document.getElementById("fCatatan").value.trim();

  if (!nama || !tanggal) {
    errEl.textContent = "Nama dan tanggal absen wajib diisi.";
    return;
  }
  if (!divisi) {
    errEl.textContent = "Divisi wajib dipilih.";
    return;
  }

  const submitBtn = document.getElementById("submitBtn");
  submitBtn.disabled = true;
  submitBtn.textContent = "Menyimpan...";

  const now = new Date();
  const entry = {
    id: now.getTime() + "-" + Math.random().toString(36).slice(2, 8),
    nama,
    divisi,
    status: currentStatus,
    kontribusi,
    catatan,
    tanggal,
    waktu: now.toLocaleTimeString("id-ID"),
    timestamp: now.getTime(),
  };

  loadRecords();
  records.push(entry);
  persist();

  const stampEl = document.getElementById("stampEl");
  stampEl.classList.add("show");
  setTimeout(() => stampEl.classList.remove("show"), 1600);

  document.getElementById("fNama").value = "";
  document.getElementById("fDivisi").value = "";
  document.getElementById("fKontribusi").value = "";
  document.getElementById("fCatatan").value = "";
  submitBtn.disabled = false;
  submitBtn.textContent = "Kirim Absen";
});

// ---------- Admin login ----------
document.getElementById("loginForm").addEventListener("submit", (e) => {
  e.preventDefault();
  const pwInput = document.getElementById("pwInput");
  const pwError = document.getElementById("pwError");
  if (pwInput.value === ADMIN_PASSWORD) {
    pwError.textContent = "";
    pwInput.value = "";
    loadRecords();
    renderAdmin();
    showView("admin");
  } else {
    pwError.textContent = "Kata sandi salah. Hubungi koordinator KKN.";
  }
});

document.getElementById("logoutBtn").addEventListener("click", () => showView("form"));
document.getElementById("reloadBtn").addEventListener("click", () => { loadRecords(); renderAdmin(); });
document.getElementById("searchInput").addEventListener("input", (e) => { search = e.target.value; renderAdmin(false); });
document.getElementById("dateFilter").addEventListener("change", (e) => { dateFilter = e.target.value; renderAdmin(false); });
document.getElementById("divisiFilter").addEventListener("change", (e) => { divisiFilter = e.target.value; renderAdmin(false); });

function getFiltered() {
  return records
    .filter((r) => (dateFilter === "Semua" ? true : r.tanggal === dateFilter))
    .filter((r) => (divisiFilter === "Semua" ? true : r.divisi === divisiFilter))
    .filter((r) => {
      const q = search.trim().toLowerCase();
      if (!q) return true;
      return r.nama.toLowerCase().includes(q);
    })
    .sort((a, b) => b.timestamp - a.timestamp);
}

function renderAdmin(rebuildDateOptions = true) {
  const filtered = getFiltered();

  // summary
  const counts = { Hadir: 0, Izin: 0, Sakit: 0, Alpa: 0 };
  filtered.forEach((r) => { if (counts[r.status] !== undefined) counts[r.status]++; });
  const donaturCount = filtered.filter((r) => r.divisi === "Donatur").length;
  const kontribusiCount = filtered.filter((r) => r.kontribusi && r.kontribusi.trim()).length;
  const summaryRow = document.getElementById("summaryRow");
  summaryRow.innerHTML = `
    <div class="kkn-summary-chip">TOTAL<b>${filtered.length}</b></div>
    <div class="kkn-summary-chip">HADIR<b style="color:${STATUS_COLOR.Hadir}">${counts.Hadir}</b></div>
    <div class="kkn-summary-chip">IZIN<b style="color:${STATUS_COLOR.Izin}">${counts.Izin}</b></div>
    <div class="kkn-summary-chip">SAKIT<b style="color:${STATUS_COLOR.Sakit}">${counts.Sakit}</b></div>
    <div class="kkn-summary-chip">ALPA<b style="color:${STATUS_COLOR.Alpa}">${counts.Alpa}</b></div>
    <div class="kkn-summary-chip">DONATUR<b style="color:${STATUS_COLOR.Izin}">${donaturCount}</b></div>
    <div class="kkn-summary-chip">ADA KONTRIBUSI<b>${kontribusiCount}</b></div>
  `;

  // date filter options
  if (rebuildDateOptions) {
    const dateSelect = document.getElementById("dateFilter");
    const uniqueDates = Array.from(new Set(records.map((r) => r.tanggal))).sort((a, b) => (a < b ? 1 : -1));
    dateSelect.innerHTML = `<option value="Semua">Semua Tanggal</option>` +
      uniqueDates.map((d) => `<option value="${d}">${formatTanggal(d)}</option>`).join("");
    dateSelect.value = dateFilter;
  }

  // table
  const tableArea = document.getElementById("tableArea");
  if (filtered.length === 0) {
    tableArea.innerHTML = `<div class="kkn-empty">Belum ada data absensi untuk filter ini.</div>`;
    return;
  }
  const rows = filtered.map((r, i) => `
    <tr>
      <td>${i + 1}</td>
      <td>${escapeHtml(r.nama)}</td>
      <td>${escapeHtml(r.divisi) || "-"}</td>
      <td><span class="kkn-status-badge" style="background:${STATUS_COLOR[r.status] || "#888"}">${r.status}</span></td>
      <td>${formatTanggal(r.tanggal)}</td>
      <td style="font-family:'JetBrains Mono', monospace;">${r.waktu}</td>
      <td>${escapeHtml(r.kontribusi) || "-"}</td>
      <td>${escapeHtml(r.catatan) || "-"}</td>
      <td><button class="kkn-del-btn" data-id="${r.id}" title="Hapus data">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
      </button></td>
    </tr>
  `).join("");
  tableArea.innerHTML = `
    <div class="kkn-table-wrap">
      <table class="kkn-table">
        <thead>
          <tr><th>No</th><th>Nama</th><th>Divisi</th><th>Status</th><th>Tanggal</th><th>Waktu</th><th>Kontribusi</th><th>Catatan</th><th></th></tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
  tableArea.querySelectorAll(".kkn-del-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const id = btn.getAttribute("data-id");
      records = records.filter((r) => r.id !== id);
      persist();
      renderAdmin(false);
    });
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str || "";
  return div.innerHTML;
}

// ---------- Export ----------
document.getElementById("exportBtn").addEventListener("click", () => {
  const filtered = getFiltered();
  const rows = filtered.map((r, i) => ({
    No: i + 1,
    Nama: r.nama,
    Divisi: r.divisi,
    Status: r.status,
    Tanggal: formatTanggal(r.tanggal),
    Waktu: r.waktu,
    Kontribusi: r.kontribusi,
    Catatan: r.catatan,
  }));
  const ws = XLSX.utils.json_to_sheet(rows.length ? rows : [{ No: "", Nama: "", Divisi: "", Status: "", Tanggal: "", Waktu: "", Kontribusi: "", Catatan: "" }]);
  ws["!cols"] = [{ wch: 5 }, { wch: 24 }, { wch: 14 }, { wch: 10 }, { wch: 26 }, { wch: 12 }, { wch: 26 }, { wch: 30 }];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Absensi");
  const stamp = new Date().toISOString().slice(0, 10);
  XLSX.writeFile(wb, `Absensi_KKN_${stamp}.xlsx`);
});

// init
loadRecords();
</script>
</body>
</html>
